html { font-size: 27px; }
* { font-size: inherit !important; box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:#0f1117; color:#e2e8f0; padding-bottom:100px; }
.card .cv { font-size: 1.3rem !important; }
.hdr h1 { font-size: 1.2rem !important; }
.btn-refresh { font-size: 1rem !important; }
.bnav-item { font-size: 1rem !important; }

.hcard-price { font-size: 1.4rem !important; }
.hcard-sym { font-size: 1.1rem !important; }

th, td { font-size: 0.95rem !important; }

/* Header */
.hdr{background:linear-gradient(135deg,#1a1f2e,#252d3f);padding:18px 20px 14px;position:sticky;top:0;z-index:100;border-bottom:1px solid #2d3748;}
.hdr-top{display:flex;justify-content:space-between;align-items:center;}
.hdr h1{color:#63b3ed;font-weight:700;}
.hdr p{color:#718096;font-size:15px;margin-top:3px;}
.btn-refresh{background:linear-gradient(135deg,#2b6cb0,#3182ce);color:#fff;border:none;border-radius:24px;padding:12px 20px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px;}
.spin{display:inline-block;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* Day PNL bar */
.day-bar{display:none;background:#141820;padding:10px 16px;border-bottom:1px solid #2d3748;overflow-x:auto;}
.day-bar-inner{display:flex;gap:20px;min-width:max-content;}
.day-item .lbl{font-size:10px;color:#718096;}
.day-item .val{font-size:15px;font-weight:800;margin-top:1px;}

/* Status & Alert */
.alert{background:#742a2a;border-left:3px solid #fc8181;padding:8px 14px;margin:10px 12px;border-radius:4px;font-size:11px;color:#fed7d7;line-height:1.6;}
.status{padding:6px 16px;font-size:10px;color:#718096;border-bottom:1px solid #1a2030;}

/* Bottom Nav */
.bnav{position:fixed;bottom:0;left:0;right:0;background:#1a1f2e;border-top:1px solid #2d3748;display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom);}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 2px 6px;cursor:pointer;color:#718096;font-size:9px;gap:3px;border:none;background:none;transition:color 0.2s;}
.bnav-item.active{color:#63b3ed;}

/* Layout */
.section{display:none;padding:12px 14px;}
.section.active{display:block;}
.cards2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.card{background:#1a1f2e;border:1px solid #2d3748;border-radius:10px;padding:11px 10px;}
.card .cl{color:#718096;font-size:9px;margin-bottom:2px;}
.card .cv{font-weight:800;line-height:1.2;}
.card .cs{font-size:9px;color:#718096;margin-top:3px;}

/* Colors */
.cy{color:#f6e05e;}.cg{color:#68d391;}.cr{color:#fc8181;}.cb{color:#63b3ed;}.co{color:#f6ad55;}.cgr{color:#a0aec0;}
.g{color:#68d391;}.r{color:#fc8181;}

/* Tables */
.st{font-size:10px;font-weight:700;color:#a0aec0;margin:14px 0 7px;text-transform:uppercase;letter-spacing:0.8px;display:flex;align-items:center;gap:6px;}
.st::after{content:'';flex:1;height:1px;background:#2d3748;}
